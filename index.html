<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature Search Generator</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        .form-group { margin-bottom: 1.5rem; }
        textarea { width: 100%; height: 100px; padding: 0.5rem; }
        .filters { display: flex; gap: 1rem; margin-top: 0.5rem; }
        button { padding: 0.5rem 1rem; background: #0056b3; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #004494; }
        .result-box { margin-top: 2rem; padding: 1rem; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; }
        .journal-section { margin-bottom: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 1rem; }
        a { color: #0056b3; text-decoration: none; display: block; margin-bottom: 0.25rem; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>IS Literature Search Link Generator</h1>
    
    <div class="form-group">
        <label for="searchString"><strong>Base Boolean Search String:</strong></label><br>
        <textarea id="searchString" placeholder='e.g., ("artificial intelligence" OR "AI") AND "adoption"'></textarea>
    </div>

    <div class="form-group">
        <strong>Filters:</strong>
        <div class="filters">
            <label><input type="checkbox" id="basketOf8"> AIS Senior Scholars' List of Premier Journals</label>
            <label><input type="checkbox" id="vhbA"> VHB Rank A Only</label>
        </div>
    </div>

    <button onclick="generateLinks()">Generate Search Links</button>

    <div id="results" class="result-box">
        <em>Generated links will appear here...</em>
    </div>

    <script src="app.js"></script>
</body>
</html>
